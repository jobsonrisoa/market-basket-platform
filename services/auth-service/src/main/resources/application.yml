server:
  port: 8080

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:5432/market_auth
    username: market
    password: market

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true

  kafka:
    bootstrap-servers: localhost:9092

  data:
    redis.repositories.enabled: false
    redis:
      host: localhost
      port: 6379

auth:
  jwt:
    issuer: http://localhost:8080
    audience: market-basket-platform
    access-token-ttl: 15m
    key-id: local-dev-key
  refresh-token:
    ttl: 30d

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
