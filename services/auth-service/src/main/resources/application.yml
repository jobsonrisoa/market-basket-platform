server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: auth-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/market_auth}
    username: ${SPRING_DATASOURCE_USERNAME:market}
    password: ${SPRING_DATASOURCE_PASSWORD:market}

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    open-in-view: false
    show-sql: ${SPRING_JPA_SHOW_SQL:false}

  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: ${SPRING_FLYWAY_LOCATIONS:classpath:db/migration}

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

  data:
    redis.repositories.enabled: false
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

auth:
  jwt:
    issuer: ${AUTH_JWT_ISSUER:http://localhost:8080}
    audience: ${AUTH_JWT_AUDIENCE:market-basket-platform}
    access-token-ttl: ${AUTH_JWT_ACCESS_TOKEN_TTL:15m}
    key-id: ${AUTH_JWT_KEY_ID:local-dev-key}
  refresh-token:
    ttl: ${AUTH_REFRESH_TOKEN_TTL:30d}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENVIRONMENT:local}
  release: ${SENTRY_RELEASE:${spring.application.name}@local}
  traces-sample-rate: ${SENTRY_TRACES_SAMPLE_RATE:0.0}
