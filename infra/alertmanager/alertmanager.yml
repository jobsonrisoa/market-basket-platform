global:
  resolve_timeout: 5m

route:
  group_by:
    - alertname
    - service
    - instance
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: platform-oncall

receivers:
  - name: platform-oncall
    webhook_configs:
      - url: http://127.0.0.1:65535/alertmanager-placeholder
        send_resolved: true

inhibit_rules:
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal:
      - alertname
      - instance
