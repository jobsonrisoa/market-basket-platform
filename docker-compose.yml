x-observability-env: &observability-env
  SENTRY_DSN: ${SENTRY_DSN:-}
  SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-local}
  SENTRY_RELEASE: ${SENTRY_RELEASE:-market-basket-platform@local}
  SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.0}

services:
  postgres:
    image: postgres:16
    container_name: market-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-market}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-market}
      POSTGRES_DB: ${POSTGRES_DB:-market}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: market-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-market}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-market}
    ports:
      - "27017:27017"

  redis:
    image: redis:7
    container_name: market-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: market-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: market-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: ${KAFKA_BROKER_ID:-1}
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10

  auth-service:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-jobson}/market-auth-service:${IMAGE_TAG:-local}
    build:
      context: ./services/auth-service
    container_name: market-auth-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      <<: *observability-env
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/market_auth
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-market}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-market}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      AUTH_JWT_ISSUER: ${AUTH_JWT_ISSUER:-http://localhost:8080}
      AUTH_JWT_AUDIENCE: ${AUTH_JWT_AUDIENCE:-market-basket-platform}
      AUTH_JWT_KEY_ID: ${AUTH_JWT_KEY_ID:-local-dev-key}
      AUTH_JWT_ACCESS_TOKEN_TTL: ${AUTH_JWT_ACCESS_TOKEN_TTL:-15m}
      AUTH_REFRESH_TOKEN_TTL: ${AUTH_REFRESH_TOKEN_TTL:-30d}
    ports:
      - "8080:8080"

  customer-service:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-jobson}/market-customer-service:${IMAGE_TAG:-local}
    build:
      context: ./services/customer-service
    container_name: market-customer-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      <<: *observability-env
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/market_customer
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-market}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-market}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    ports:
      - "8081:8081"

  catalog-service:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-jobson}/market-catalog-service:${IMAGE_TAG:-local}
    build:
      context: ./services/catalog-service
    container_name: market-catalog-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      <<: *observability-env
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/market_catalog
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-market}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-market}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    ports:
      - "8082:8082"

  subscription-service:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-jobson}/market-subscription-service:${IMAGE_TAG:-local}
    build:
      context: ./services/subscription-service
    container_name: market-subscription-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      <<: *observability-env
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/market_subscription
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-market}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-market}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    ports:
      - "8083:8083"

  order-service:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-jobson}/market-order-service:${IMAGE_TAG:-local}
    build:
      context: ./services/order-service
    container_name: market-order-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      <<: *observability-env
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: 8084
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/market_order
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-market}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-market}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    ports:
      - "8084:8084"

  inventory-service:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-jobson}/market-inventory-service:${IMAGE_TAG:-local}
    build:
      context: ./services/inventory-service
    container_name: market-inventory-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      <<: *observability-env
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: 8085
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/market_inventory
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-market}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-market}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    ports:
      - "8085:8085"

  notification-service:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-jobson}/market-notification-service:${IMAGE_TAG:-local}
    build:
      context: ./services/notification-service
    container_name: market-notification-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      <<: *observability-env
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: 8086
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/market_notification
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-market}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-market}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    ports:
      - "8086:8086"

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: market-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:11.2.0
    container_name: market-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro

  sonarqube:
    image: sonarqube:community
    container_name: market-sonarqube
    ports:
      - "9000:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
