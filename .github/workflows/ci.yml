name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  migration-validation:
    name: Validate migrations (${{ matrix.service }})
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth-service
            path: services/auth-service
            database: market_auth
          - service: customer-service
            path: services/customer-service
            database: market_customer
          - service: seller-service
            path: services/seller-service
            database: market_seller
          - service: catalog-service
            path: services/catalog-service
            database: market_catalog
          - service: subscription-service
            path: services/subscription-service
            database: market_subscription
          - service: order-service
            path: services/order-service
            database: market_order
          - service: inventory-service
            path: services/inventory-service
            database: market_inventory
          - service: notification-service
            path: services/notification-service
            database: market_notification

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: ${{ matrix.path }}/pom.xml

      - name: Make Maven wrapper executable
        run: chmod +x mvnw
        working-directory: ${{ matrix.path }}

      - name: Create service database
        run: >
          docker exec "${{ job.services.postgres.id }}"
          psql -U postgres -d postgres -v ON_ERROR_STOP=1
          -c "CREATE DATABASE ${{ matrix.database }};"

      - name: Validate migrations
        run: ./mvnw -B -ntp flyway:migrate flyway:validate flyway:info
        working-directory: ${{ matrix.path }}
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/${{ matrix.database }}
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres

  service-build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth-service
            path: services/auth-service
          - service: customer-service
            path: services/customer-service
          - service: seller-service
            path: services/seller-service
          - service: catalog-service
            path: services/catalog-service
          - service: subscription-service
            path: services/subscription-service
          - service: order-service
            path: services/order-service
          - service: inventory-service
            path: services/inventory-service
          - service: notification-service
            path: services/notification-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: ${{ matrix.path }}/pom.xml

      - name: Make Maven wrapper executable
        run: chmod +x mvnw
        working-directory: ${{ matrix.path }}

      - name: Check formatting
        run: ./mvnw -B -ntp spotless:check
        working-directory: ${{ matrix.path }}

      - name: Test and package
        run: ./mvnw -B -ntp package
        working-directory: ${{ matrix.path }}

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-test-reports
          path: ${{ matrix.path }}/target/surefire-reports/
          if-no-files-found: ignore

      - name: Upload service jar
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-jar
          path: ${{ matrix.path }}/target/*.jar
          if-no-files-found: error
