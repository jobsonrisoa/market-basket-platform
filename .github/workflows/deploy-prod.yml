name: Deploy Prod

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Immutable image tag to deploy, usually a Git SHA"
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to prod
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            export IMAGE_TAG="${{ inputs.image_tag }}"
            ./scripts/run-migrations.sh
            docker compose pull
            docker compose up -d --remove-orphans
            docker compose ps
            curl --fail --retry 12 --retry-delay 5 http://localhost:8080/actuator/health
            curl --fail --retry 12 --retry-delay 5 http://localhost:8000/.well-known/jwks.json
            curl --fail --retry 12 --retry-delay 5 http://localhost:9090/-/ready
